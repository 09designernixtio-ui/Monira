const fmtUSD = (n, opts = {}) => {
  const { sign = false } = opts;
  const abs = Math.abs(n);
  const formatted = `$${abs.toLocaleString('en-US')}`;
  if (n < 0) return `−${formatted}`;
  if (sign && n > 0) return `+${formatted}`;
  return formatted;
};

  { bg: '#C04A24', fg: '#FFFFFF' }, { bg: '#2D5A3F', fg: '#FFFFFF' },

];
const avatarColor = (name) => {
  let h = 0; for (let i=0;i<name.length;i++) h = name.charCodeAt(i) + ((h<<5)-h);
  return AVA_COLORS[Math.abs(h) % AVA_COLORS.length];
};

const ReceivableScreen = ({ onBack }) => {
  const [filter, setFilter] = React.useState('all');
  const [items, setItems] = React.useState(RECEIVABLES.map(r=>({...r})));
  const [showAdd, setShowAdd] = React.useState(false);

  const filtered = items.filter(r => {
    if (filter === 'all')      return true;
    if (filter === 'pending')  return r.status === 'pending'  && r.daysOverdue === 0;
    if (filter === 'overdue')  return r.status === 'overdue'  || r.daysOverdue > 0;
    if (filter === 'received') return r.status === 'received';
    return true;
  });

  const totalExp = items.filter(r => r.status !== 'received').reduce((s,r)=>s+r.amount,0);
  const totalOvd = items.filter(r => r.daysOverdue > 0 || r.status === 'overdue').reduce((s,r)=>s+r.amount,0);
  const totalRec = items.filter(r => r.status === 'received').reduce((s,r)=>s+r.amount,0);

  const StatusBadge = ({ r }) => {
    if (r.status === 'received') return <Badge tone="positive"><I.Check2 size={11}/> Received</Badge>;
    if (r.daysOverdue > 0 || r.status === 'overdue') return <Badge tone="negative"><I.Clock size={11}/> {r.daysOverdue}d overdue</Badge>;
    return <Badge tone="warn">Pending</Badge>;
  };

  return (
    <div className="ft-fade">
      {showAdd && <AddReceivableModal onClose={()=>setShowAdd(false)} onAdd={r=>setItems(p=>[...p,r])}/>}
      <div className="flex items-center gap-3 mb-6"><button onClick={onBack} className="ft-btn-ghost"><I.ChevronLeft size={14}/> Dashboard</button></div>
      <div className="flex items-end justify-between pb-6 border-b mb-6" style={{borderColor:'var(--line)'}}>
        <div>
          <div className="text-[11px] uppercase tracking-[0.14em] font-medium mb-2" style={{color:'var(--ink-3)'}}>Accounts Receivable</div>
          <h1 className="ft-serif text-[38px] leading-[1.05] font-medium" style={{color:'var(--ink)'}}>Outstanding invoices</h1>
        </div>
        <button className="ft-btn-primary" onClick={()=>setShowAdd(true)}><I.Plus size={14}/> Add receivable</button>
      </div>

      {/* Three KPI cards */}
      <div className="grid grid-cols-3 gap-4 mb-5">
        <div className="ft-card p-5">
          <div className="text-[11px] uppercase tracking-[0.1em] mb-2" style={{color:'var(--ink-3)'}}>Expected</div>
          <div className="ft-mono text-[26px] font-medium" style={{color:'var(--ink)'}}>{fmtUSD(totalExp)}</div>
          <div className="text-[11px] mt-1" style={{color:'var(--ink-3)'}}>pending + overdue</div>
        </div>
        <div className="p-5 rounded-[14px]" style={{background:'var(--negative-soft)',border:'1px solid var(--negative)'}}>
          <div className="text-[11px] uppercase tracking-[0.1em] mb-2 flex items-center gap-1.5" style={{color:'var(--negative)'}}><I.AlertCircle size={12}/> Overdue</div>
          <div className="ft-mono text-[26px] font-medium" style={{color:'var(--negative)'}}>{fmtUSD(totalOvd)}</div>
          <div className="text-[11px] mt-1" style={{color:'var(--negative)'}}>requires attention</div>
        </div>
        <div className="p-5 rounded-[14px]" style={{background:'var(--positive-soft)',border:'1px solid var(--positive)'}}>
          <div className="text-[11px] uppercase tracking-[0.1em] mb-2 flex items-center gap-1.5" style={{color:'var(--positive)'}}><I.Check2 size={12}/> Received</div>
          <div className="ft-mono text-[26px] font-medium" style={{color:'var(--positive)'}}>{fmtUSD(totalRec)}</div>
          <div className="text-[11px] mt-1" style={{color:'var(--positive)'}}>funds confirmed</div>
        </div>
      </div>

      {/* Filters — now 4 states */}
      <div className="flex items-center gap-2 mb-4">
        {[['all','All'],['pending','Pending'],['overdue','Overdue'],['received','Received']].map(([v,l])=>(
          <button key={v} onClick={()=>setFilter(v)} className="px-3 py-1.5 rounded-lg text-[12.5px] font-medium border"

        <div className="grid gap-3 px-5 py-3 text-[10.5px] uppercase tracking-[0.1em] font-medium border-b"

        </div>
        {filtered.length === 0 && <div className="py-8 text-center text-[13px]" style={{color:'var(--ink-3)'}}>No items</div>}

  const allItems = isIncome ? INCOME_ITEMS : EXPENSE_ITEMS;
  const items = isIncome ? allItems : allItems.filter(it => {
    if (expFilter === 'all') return true;
    return (expCatMap[it.category] || 'one-time') === expFilter;

          <div className="text-[11px] uppercase tracking-[0.12em]" style={{color:'var(--ink-3)'}}>Total</div>

            <div className="text-[11px] ft-mono mt-0.5" style={{color:'var(--ink-3)'}}>of {fmtUSD(grandTotal)} total</div>

const MoM = ({ value, accent, inverse }) => {
  const up = value > 0;
  const good = inverse ? !up : up;
  const color = accent ? 'rgba(244,239,227,0.85)' : (good ? 'var(--positive)' : 'var(--negative)');
  const bg    = accent ? 'rgba(244,239,227,0.12)'  : (good ? 'var(--positive-soft)' : 'var(--negative-soft)');
  return (
    <span className="ft-chip text-[10.5px]" style={{ background: bg, color }}>
      {up ? <I.ArrowUpRight size={10}/> : <I.ArrowDownRight size={10}/>}
      {Math.abs(value).toFixed(0)}%
    </span>
  );
};

const StatCard = ({ label, value, sub, mom, momInverse, accent, tone, onClick }) => {
  const valueColor = accent ? 'var(--bg)' : tone === 'positive' ? 'var(--positive)' : tone === 'negative' ? 'var(--negative)' : 'var(--ink)';
  return (
    <div className={`px-5 py-4 ${accent ? 'relative overflow-hidden' : 'ft-card'} ${onClick ? 'ft-clickable' : ''}`}
      onClick={onClick}
      style={accent ? { background: 'var(--ink)', borderRadius: 14 } : {}}>
      {accent && <div className="absolute -top-10 -right-10 w-40 h-40 rounded-full" style={{ background: 'radial-gradient(circle, rgba(192,74,36,0.4), transparent 70%)' }}/>}
      <div className="flex items-center justify-between mb-2 relative">
        <div className="text-[11px] uppercase tracking-[0.14em] font-medium" style={{ color: accent ? 'rgba(244,239,227,0.5)' : 'var(--ink-3)' }}>{label}</div>
        {mom !== undefined && <MoM value={mom} accent={accent} inverse={momInverse}/>}
      </div>
      <div className="ft-mono text-[26px] font-medium tracking-tight relative" style={{ color: valueColor }}>{value}</div>
      <div className="text-[11.5px] mt-1 relative flex items-center gap-1" style={{ color: accent ? 'rgba(244,239,227,0.6)' : 'var(--ink-3)' }}>
        {onClick && <I.ArrowUpRight size={11} style={{ color: accent ? 'rgba(244,239,227,0.5)' : 'var(--ink-4)' }}/>}
        {sub}
      </div>
    </div>
  );
};

const CreateInvoiceModal = ({ project, onClose, onCreated }) => {
  const alloc = PROJECT_ALLOCATIONS[project.id] || {};
  const prevTotal = (alloc.invoices||[]).reduce((s,i) => s+i.amount,0);
  const projectValue = project.budget || (project.spentHours * project.commercialRate);

const Projects = () => {
  const [search, setSearch] = useState('');
  const [typeFilter, setTypeFilter] = useState('all');
  const [sortBy, setSortBy] = useState('profit');
  const [showAdd, setShowAdd] = useState(false);
  const [selectedProject, setSelectedProject] = useState(null);

  const filtered = useMemo(() => {
    return PROJECTS
      .filter(p => p.name.toLowerCase().includes(search.toLowerCase()) || p.client.toLowerCase().includes(search.toLowerCase()) || p.sales.toLowerCase().includes(search.toLowerCase()))
      .filter(p => typeFilter === 'all' || p.type === typeFilter)
      .sort((a,b) => {
        if (sortBy === 'profit') return computeProfit(b) - computeProfit(a);
        if (sortBy === 'name')   return a.name.localeCompare(b.name);
        return 0;
      });
  }, [search, typeFilter, sortBy]);

  const activeCount = PROJECTS.filter(p => p.status === 'Active').length;
  const outstanding = PROJECTS.reduce((s,p) => s + p.outstanding, 0);

  return (
    <div className="ft-fade">

      {selectedProject && <ProjectPanel project={selectedProject} onClose={()=>setSelectedProject(null)}/>}

        <MiniStat label="Active projects"  value={String(activeCount)} sub={`of ${PROJECTS.length} total`}/>
        <MiniStat label="Revenue forecast" value="$120,000" sub="across active projects"/>
        <MiniStat label="Outstanding"      value={fmtUSD(outstanding)} sub="still to be invoiced" tone="warn"/>

      <div className="flex items-center gap-3 mb-5">
        <div className="relative flex-1 max-w-md">
          <span className="absolute left-3 top-1/2 -translate-y-1/2" style={{color:'var(--ink-3)'}}><I.Search size={15}/></span>
          <input className="ft-input with-icon" placeholder="Search by project, client, sales" value={search} onChange={e => setSearch(e.target.value)}/>
        </div>
        <select className="ft-select" value={typeFilter} onChange={e => setTypeFilter(e.target.value)}>
          <option value="all">All types</option><option value="Fixed">Fixed</option><option value="T&M">T&M</option><option value="Subscription">Subscription</option>
        </select>
        <select className="ft-select"><option>All executors</option><option>Tanya</option><option>Andrii</option></select>
        <select className="ft-select"><option>All sales</option><option>Alex L.</option><option>Tanya</option></select>
      </div>
      <div className="ft-card overflow-hidden">
        <div className="grid gap-3 px-5 py-3.5 text-[10.5px] uppercase tracking-[0.1em] font-medium border-b"
          style={{color:'var(--ink-3)',borderColor:'var(--line)',background:'var(--bg-grain)',gridTemplateColumns:'2.2fr 0.8fr 1fr 1.2fr 0.9fr 0.9fr 1.1fr 1fr 1fr 0.4fr'}}>
          <span>Project</span><span>Type</span><span>Budget / Rate</span><span>Hours</span>

// helpers
const today = new Date();
const todayStr = today.toISOString().split('T')[0];

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const now = new Date(todayStr);
  const d = new Date(dateStr);
  // This year or next
  const thisYear = new Date(now.getFullYear(), d.getMonth(), d.getDate());
  if (thisYear < now) thisYear.setFullYear(now.getFullYear()+1);
  return Math.round((thisYear - now)/(1000*60*60*24));
}

function yearsAgo(dateStr) {
  if (!dateStr) return 0;
  return today.getFullYear() - new Date(dateStr).getFullYear();
}

function monthsSince(dateStr) {
  if (!dateStr) return 0;
  const d = new Date(dateStr);
  return (today.getFullYear()-d.getFullYear())*12+(today.getMonth()-d.getMonth());
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  return new Date(dateStr).toLocaleDateString('uk-UA',{day:'numeric',month:'short',year:'numeric'});
}

function workingDaysInMonth(year, month, fridayHours, customHolidays) {
  const holidaySet = new Set((customHolidays||[]).map(h=>h.date));
  let days=0, hours=0;
  const d = new Date(year,month,1);
  while(d.getMonth()===month) {
    const dow=d.getDay();
    const ds=d.toISOString().split('T')[0];
    if(dow!==0&&dow!==6&&!holidaySet.has(ds)){
      days++;
      hours+=(dow===5?(fridayHours||8):8);
    }
    d.setDate(d.getDate()+1);
  }
  return {days,hours};
}

const HRBanner = ({ team, calSettings }) => {
  const alerts = [];
  team.forEach(m => {
    const bd = daysUntil(m.birthday);
    if (bd !== null && bd <= 7) {
      const label = bd === 0 ? `🎂 Today is ${m.name}'s birthday!` : `🎂 ${m.name}'s birthday in ${bd} days`;
      alerts.push({ type:'birthday', label, tone:'warn' });
    }
    const ms = monthsSince(m.startDate);
    if (ms >= 3 && ms < 3.5) alerts.push({ type:'probation', label:`⏱ ${m.name} — 3 months at the company (probation period)`, tone:'accent' });
    const yr = yearsAgo(m.startDate);
    if (yr > 0) {
      const anniv = daysUntil(m.startDate);
      if (anniv !== null && anniv <= 7 && anniv >= 0) alerts.push({ type:'anniversary', label:`🎉 ${m.name} — ${yr} year(s) at the company in ${anniv} days`, tone:'positive' });
    }
  });
  if (alerts.length === 0) return null;
  return (
    <div className="rounded-xl p-4 mb-5 flex flex-wrap gap-2 items-start" style={{background:'var(--warn-soft)', border:'1px solid var(--line-2)'}}>

};

  const [tab, setTab] = useState('payroll');
  const [calSettings, setCalSettings] = useState(CALENDAR_SETTINGS_DEFAULT);

  return (
    <div className="ft-fade">
      <TopBar title="Team" subtitle="People." period="June 2026"
        action={<button className="ft-btn-primary"><I.Plus size={14}/> Add Employee</button>}/>

      {/* Tab switcher — no icons */}
      <div className="flex items-center gap-1 p-1 mb-6 rounded-xl w-fit" style={{background:'var(--surface)', border:'1px solid var(--line)'}}>
        {[['payroll','Payroll'],['hr','HR / People']].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)}
            className="px-4 py-2 rounded-lg text-[13px] font-medium transition"
            style={{background:tab===v?'var(--ink)':'transparent', color:tab===v?'var(--bg)':'var(--ink-2)'}}>
            {l}
          </button>
        ))}
      </div>

      {tab==='payroll' ? <PayrollTab/> : <HRTab calSettings={calSettings} setCalSettings={setCalSettings}/>}
    </div>
  );
};

// ============================================================================
// CASHFLOW (kept simple — recent transactions remains here, removed only from Dashboard)

const Cashflow = () => {
  const [flowFilter, setFlowFilter] = React.useState('all');
  const [expFilter, setExpFilter] = React.useState('all');
  const expCatMap = { 'Payroll':'salary','Software':'subscription','Infrastructure':'subscription','Office':'one-time','One-time':'one-time' };
  const allItems = [
    ...INCOME_ITEMS.map(i=>({...i,kind:'in'})),
    ...EXPENSE_ITEMS.map(e=>({...e,kind:'out'})),
  ];
  const filtered = allItems.filter(t => {
    if (flowFilter==='in' && t.kind!=='in') return false;
    if (flowFilter==='out' && t.kind!=='out') return false;
    if (t.kind==='out' && expFilter!=='all') { if ((expCatMap[t.category]||'one-time')!==expFilter) return false; }
    return true;
  }).sort((a,b)=>b.amount-a.amount);

  return (
    <div className="ft-fade">
      <TopBar title="Cashflow" subtitle="Money in, money out." period="June 2026"/>
      <div className="grid grid-cols-4 gap-4 mb-5">
        <MiniStat label="Money in" value="$31,970" sub="June inflows" tone="positive"/>
        <MiniStat label="Money out" value="$15,078" sub="payroll · subscriptions"/>
        <MiniStat label="Net flow" value="+$16,892" sub="month to date" tone="positive"/>
        <MiniStat label="Runway" value="11.4 mo" sub="at current burn"/>
      </div>
      {/* Filters */}
      <div className="flex items-center gap-3 mb-4 flex-wrap">
        <div className="flex items-center gap-1 p-1 rounded-xl" style={{background:'var(--surface)',border:'1px solid var(--line)'}}>
          {[['all','All'],['in','Income'],['out','Expenses']].map(([v,l])=>(
            <button key={v} onClick={()=>setFlowFilter(v)}
              className="px-3 py-1.5 rounded-lg text-[12.5px] font-medium transition"
              style={{background:flowFilter===v?'var(--ink)':'transparent',color:flowFilter===v?'var(--bg)':'var(--ink-2)'}}>
              {l}
            </button>
          ))}
        </div>
        {flowFilter !== 'in' && (
          <div className="flex items-center gap-1 p-1 rounded-xl" style={{background:'var(--surface)',border:'1px solid var(--line)'}}>
            {[['all','All expenses'],['salary','Salaries'],['subscription','Subscriptions'],['one-time','One-time payments']].map(([v,l])=>(
              <button key={v} onClick={()=>setExpFilter(v)}
                className="px-3 py-1.5 rounded-lg text-[12.5px] font-medium transition"
                style={{background:expFilter===v?'var(--accent-soft)':'transparent',color:expFilter===v?'var(--accent-2)':'var(--ink-2)'}}>
                {l}
              </button>
            ))}
          </div>
        )}
      </div>
      <div className="ft-card p-6">
        <div className="ft-serif text-[20px] font-medium mb-4" style={{color:'var(--ink)'}}>Transactions</div>
        <div className="space-y-0">
          {filtered.map(t=>(
            <div key={t.kind+t.id} className="flex items-center gap-3 py-2.5 border-b last:border-0" style={{borderColor:'var(--line)'}}>
              <div className="w-7 h-7 rounded-md flex items-center justify-center shrink-0"
                style={{background:t.kind==='in'?'var(--positive-soft)':'var(--negative-soft)',color:t.kind==='in'?'var(--positive)':'var(--negative)'}}>
                {t.kind==='in' ? <I.ArrowDown size={13}/> : <I.ArrowUp size={13}/>}
              </div>
              <div className="flex-1 min-w-0">
                <div className="text-[13.5px] font-medium" style={{color:'var(--ink)'}}>{t.source}</div>
                <div className="text-[11px] ft-mono" style={{color:'var(--ink-3)'}}>{t.date} · {t.category}</div>
              </div>
              <Badge tone={t.kind==='in'?'positive':'neutral'}>{t.category}</Badge>
              <div className="ft-mono text-[14px] font-medium" style={{color:t.kind==='in'?'var(--positive)':'var(--ink)'}}>
                {t.kind==='in' ? fmtUSD(t.amount,{sign:true}) : fmtUSD(-t.amount)}
              </div>
            </div>
          ))}
          {filtered.length===0 && <div className="py-8 text-center text-[13px]" style={{color:'var(--ink-3)'}}>No transactions match this filter</div>}
        </div>
      </div>
    </div>
  );
};

// ============================================================================
// ROOT
// ============================================================================
function App() {
  const [view, setView] = useState('dashboard');
  const [modal, setModal] = useState(false);
  const [drill, setDrill] = useState(null);
  const [receivablesView, setReceivablesView] = useState(false);
  const [toast, setToast] = useState(null);

  return (
    <div className="ft-root ft-grain min-h-screen flex">
      <Sidebar view={view} setView={(v)=>{ setView(v); setDrill(null); setReceivablesView(false); }}/>
      <main className="flex-1 px-10 py-8 relative" style={{zIndex:1}}>
        <div className="max-w-[1400px] mx-auto">
          {modal && <AddEntryModal onClose={()=>setModal(false)} onSuccess={(msg)=>{ setModal(false); setToast(msg); }}/>}
          {toast && <Toast msg={toast} onDone={()=>setToast(null)}/>}
          {view==='dashboard' && (
            drill ? <DetailScreen kind={drill} onBack={()=>setDrill(null)}/>
            : receivablesView ? <ReceivableScreen onBack={()=>setReceivablesView(false)}/>
            : <Dashboard onAddEntry={()=>setModal(true)} onDrill={k=>setDrill(k)} onGoProjects={()=>setView('projects')} onViewReceivables={()=>setReceivablesView(true)}/>
          )}
          {view==='projects' && <Projects/>}
          {view==='team'     && <Team/>}
          {view==='cashflow' && <Cashflow/>}
        </div>
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
